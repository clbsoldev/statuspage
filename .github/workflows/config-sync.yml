name: Config Sync

on:
  push:
    branches:
      - main
    paths:
      - 'config.json'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    # Berechtigungen für den Push auf gh-pages
    permissions:
      contents: write

    steps:
      - name: Checkout Main (Skripte & Config)
        uses: actions/checkout@v6
        with:
          path: main

      - name: Checkout Pages (Status Dateien)
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run Sync Script
        run: |
          # Führt das Skript aus dem main-Ordner aus, 
          # manipuliert aber die Dateien im gh-pages-Ordner
          python3 main/scripts/sync_config.py

      - name: Commit & Push Changes to gh-pages
        working-directory: gh-pages
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add status/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Sync metadata & structure from config change" && git push)
          
