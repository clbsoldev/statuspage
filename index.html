<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header><h1>System Status</h1></header>
        <nav>
            <a id="nav-status" class="active" onclick="toggleView('status')">Status</a>
            <a id="nav-maint" onclick="toggleView('maint')">Maintenance</a>
        </nav>
        <div id="view-status">
            <div id="dashboard" class="grid">Lade aktuelle Zustände...</div>
            <div id="last-update" style="text-align:center; margin-top:20px; font-size:11px; color:var(--muted)"></div>
        </div>
        <div id="view-maint" style="display:none">
            <div id="maint-content">Lade Wartungsdaten...</div>
        </div>
    </div>
    <footer>&copy; 2026 clb-sol.dev | Status Dashboard</footer>

    <script src="js/app.js"></script>
</body>
</html>
