<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status</title>
    <style>
        :root { 
            --bg: #f6f8fa; 
            --border: #d0d7de; 
            --text: #24292f; 
            --muted: #656d76; 
            --primary: #0969da; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 10px;
            line-height: 1.5;
        }

        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 10px;
        }

        header h1 { 
            font-size: 1.6rem; 
            text-align: center;
            margin: 25px 0; 
        }

        nav { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 25px; 
        }

        nav a { 
            cursor: pointer; 
            color: var(--muted); 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 600;
            padding: 10px 18px; 
            border-radius: 8px; 
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        nav a.active { 
            background: white; 
            color: var(--primary); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.08); 
        }

        .grid { 
            display: grid; 
            gap: 15px; 
            grid-template-columns: 1fr; 
        }

        @media (min-width: 768px) { 
            .grid { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 20px; }
        }

        .card { 
            background: white; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            overflow: hidden; 
        }

        .header-card { 
            padding: 14px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer;
            gap: 10px;
        }

        .header-card strong {
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pill { 
            padding: 4px 8px; 
            border-radius: 6px; 
            font-size: 10px; 
            font-weight: 700; 
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .operational, .ok, .up { background: #dafbe1; color: #1a7f37; }
        .critical, .down { background: #ffebe9; color: #cf222e; }
        .maintenance { background: #ddf4ff; color: #0969da; }
        .pending { background: #f1f1f1; color: #666; }

        .details { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.3s ease; 
            background: #fafafa; 
        }

        .card.open .details { 
            max-height: 1000px; 
            border-top: 1px solid var(--border); 
        }

        .svc-row { 
            padding: 12px 16px; 
            border-bottom: 1px solid #eee; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-size: 13px; 
        }

        footer { 
            text-align: center; 
            padding: 40px 20px; 
            color: var(--muted); 
            font-size: 11px; 
        }
    </style>
</head>
<body>
    </body>
</html>
