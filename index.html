<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>System Status</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f6f8fa; color: #24292f; margin: 0; padding: 40px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .host-card { background: white; border: 1px solid #d0d7de; border-radius: 6px; margin-bottom: 16px; overflow: hidden; }
        .header { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        .header:hover { background: #f3f4f6; }
        .pill { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .operational { background: #dafbe1; color: #1a7f37; }
        .impaired { background: #fff8c5; color: #9a6700; }
        .critical { background: #ffebe9; color: #cf222e; }
        .details { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: #fafafa; }
        .host-card.open .details { max-height: 1000px; border-top: 1px solid #d0d7de; }
        .svc-row { padding: 12px 16px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; }
        .svc-main { display: flex; justify-content: space-between; }
        .output { font-size: 12px; color: #57606a; margin-top: 4px; font-family: monospace; }
        h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>System Status</h1>
        <div id="status-list">Lade Systeme...</div>
    </div>

    <script>
        async function loadStatus() {
            try {
                // 1. Config aus Main Branch holen
                const configRes = await fetch('https://raw.githubusercontent.com/clb-sol-dev/statuspage/main/config.json');
                const config = await configRes.json();
                const list = document.getElementById('status-list');
                list.innerHTML = '';

                for (const host of config.hosts) {
                    const card = document.createElement('div');
                    card.className = 'host-card';
                    
                    try {
                        const sRes = await fetch(`status/${host.id}.json?t=${Date.now()}`);
                        const s = await sRes.json();
                        
                        card.innerHTML = `
                            <div class="header" onclick="this.parentElement.classList.toggle('open')">
                                <strong>${s.display_name}</strong>
                                <span class="pill ${s.overall_status}">${s.overall_status}</span>
                            </div>
                            <div class="details">
                                ${Object.entries(s.services).map(([name, data]) => `
                                    <div class="svc-row">
                                        <div class="svc-main">
                                            <span>${name}</span>
                                            <strong>${data.status}</strong>
                                        </div>
                                        <div class="output">${data.output}</div>
                                    </div>
                                `).join('')}
                            </div>`;
                    } catch (e) {
                        card.innerHTML = `<div class="header"><strong>${host.display_name}</strong><span class="pill">No Data</span></div>`;
                    }
                    list.appendChild(card);
                }
            } catch (err) {
                document.getElementById('status-list').innerHTML = 'Konfiguration konnte nicht geladen werden.';
            }
        }
        loadStatus();
        setInterval(loadStatus, 60000);
    </script>
</body>
</html>
