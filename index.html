<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Dashboard</title>
    <style>
        :root { --bg: #f6f8fa; --border: #d0d7de; --text: #24292f; --muted: #656d76; --primary: #0969da; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; width: 100%; padding: 20px; }
        header { text-align: center; }
        nav { display: flex; justify-content: center; gap: 20px; margin: 20px 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        nav a { cursor: pointer; color: var(--muted); text-decoration: none; font-size: 14px; padding: 5px 10px; }
        nav a.active { color: var(--primary); border-bottom: 2px solid var(--primary); font-weight: 600; }
        .grid { display: grid; gap: 20px; grid-template-columns: 1fr; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(var(--cols, 2), 1fr); } }
        .card { background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .header-card { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .pill { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .operational, .ok, .up { background: #dafbe1; color: #1a7f37; }
        .impaired, .warning { background: #fff8c5; color: #9a6700; }
        .critical, .down { background: #ffebe9; color: #cf222e; }
        .maintenance { background: #ddf4ff; color: #0969da; }
        .updating, .pending { background: #f1f1f1; color: #666; }
        .details { max-height: 0; overflow: hidden; transition: max-height 0.3s; background: #fafafa; }
        .card.open .details { max-height: 1000px; border-top: 1px solid var(--border); }
        .svc-row { padding: 10px 16px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 14px; }
        .maint-card { background: white; border: 1px solid var(--border); border-radius: 6px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .maint-card.past { border-left-color: var(--muted); opacity: 0.7; }
        footer { text-align: center; padding: 40px; color: var(--muted); font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>System Status</h1></header>
        <nav>
            <a id="nav-status" class="active" onclick="toggleView('status')">Status</a>
            <a id="nav-maint" onclick="toggleView('maint')">Maintenance</a>
        </nav>
        <div id="view-status">
            <div id="dashboard" class="grid">Lade...</div>
            <div id="last-update" style="text-align:center; margin-top:20px; font-size:12px; color:var(--muted)"></div>
        </div>
        <div id="view-maint" style="display:none">
            <div id="maint-list"></div>
        </div>
    </div>
    <footer>&copy; 2026 clb-sol.dev</footer>

    <script>
        const REPO = "clb-sol-dev/statuspage";
        const fmt = (d) => new Date(d).toLocaleString('de-DE', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});

        function toggleView(v) {
            document.getElementById('view-status').style.display = v === 'status' ? 'block' : 'none';
            document.getElementById('view-maint').style.display = v === 'maint' ? 'block' : 'none';
            document.getElementById('nav-status').className = v === 'status' ? 'active' : '';
            document.getElementById('nav-maint').className = v === 'maint' ? 'active' : '';
            if(v === 'maint') loadMaint();
        }

        async function loadMaint() {
            const res = await fetch(`status/maintenance.json?t=${Date.now()}`);
            const data = await res.json();
            let h = '<h3>Aktive Wartung</h3>';
            data.active.forEach(m => h += `<div class="maint-card"><strong>${m.host} - ${m.service}</strong><br><small>Start: ${fmt(m.start)}</small><p>${m.reason}</p></div>`);
            h += '<h3>Vergangene Wartung</h3>';
            data.past.forEach(m => h += `<div class="maint-card past"><strong>${m.host} - ${m.service}</strong><br><small>${fmt(m.start)} bis ${fmt(m.end)}</small></div>`);
            document.getElementById('maint-list').innerHTML = h;
        }

        async function update() {
            try {
                const cfg = await (await fetch(`https://raw.githubusercontent.com/${REPO}/main/config.json?t=${Date.now()}`)).json();
                const dash = document.getElementById('dashboard');
                dash.style.setProperty('--cols', cfg.ui_config.columns || 2);
                
                let targets = (cfg.display_order || []).flatMap(o => {
                    if (o === 'standalone') return cfg.hosts.filter(h => h.group === 'standalone').sort((a,b) => a.display_name.localeCompare(b.display_name)).map(h => ({id: h.id}));
                    return {id: o};
                });

                let html = '';
                let latest = new Date(0);

                for (const t of targets) {
                    const data = await (await fetch(`status/${t.id}.json?t=${Date.now()}`)).json();
                    const agg = {};
                    Object.values(data.entries).forEach(e => {
                        if(e.last_update && new Date(e.last_update) > latest) latest = new Date(e.last_update);
                        if(e.service === 'Host') return;
                        if(!agg[e.service]) agg[e.service] = [];
                        agg[e.service].push(e.status.toLowerCase());
                    });

                    html += `<div class="card"><div class="header-card" onclick="this.parentElement.classList.toggle('open')">
                        <strong>${data.display_name}</strong>
                        <span class="pill ${data.overall_status}">${data.overall_status === 'updating' ? 'Re-Checking' : data.overall_status}</span>
                    </div><div class="details">`;
                    Object.keys(agg).sort().forEach(s => {
                        let w = 'operational';
                        if(agg[s].includes('critical') || agg[s].includes('down')) w = 'critical';
                        else if(agg[s].includes('warning') || agg[s].includes('impaired')) w = 'impaired';
                        else if(agg[s].includes('maintenance')) w = 'maintenance';
                        else if(agg[s].includes('updating')) w = 'updating';
                        html += `<div class="svc-row"><span>${s}</span><span class="pill ${w}">${w === 'updating' ? 'Wait...' : w}</span></div>`;
                    });
                    html += `</div></div>`;
                }
                dash.innerHTML = html;
                document.getElementById('last-update').innerText = "Letzte Aktualisierung: " + fmt(latest);
            } catch(e) {}
        }
        update();
        setInterval(update, 60000);
    </script>
</body>
</html>
